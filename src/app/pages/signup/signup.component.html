<main class="login-container" role="main" aria-labelledby="signup-heading">
  <div class="login-card">
    <h1 id="signup-heading">Create Account</h1>

    <div *ngIf="errorMessage" class="alert alert-error" role="alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username"><span class="required">*</span> Username</label>
        <input id="username" formControlName="username" class="form-control" placeholder="Choose username" />
        <div *ngIf="form.get('username')?.invalid && form.get('username')?.touched" class="error-message">Username is required</div>
      </div>

      <div class="form-group">
        <label for="email"><span class="required">*</span> Email</label>
        <input id="email" formControlName="email" class="form-control" placeholder="you@example.com" />
        <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error-message">Valid email required</div>
      </div>

      <div class="form-group">
        <label for="password"><span class="required">*</span> Password</label>
        <input id="password" formControlName="password" type="password" class="form-control" placeholder="At least 6 characters" />
        <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="error-message">Password is required (min 6 chars)</div>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || submitting">{{ submitting ? 'Creating...' : 'Create Account' }}</button>
    </form>

    <p class="back-link">
      <a routerLink="/login">← Already have an account? Sign in</a>
    </p>
  </div>
</main>
