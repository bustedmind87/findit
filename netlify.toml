# Netlify Configuration for FindIt Angular Application

[build]
  # Build command - generates the dist folder
  command = "npm run build"
  # Output directory where the build artifacts are
  publish = "dist/lostfound-frontend"
  # Function directory if you have serverless functions
  functions = "netlify/functions"

# SPA Routing - All routes redirect to index.html for Angular routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment Variables - Set these in Netlify UI under Site Settings > Build & deploy > Environment
# API_BASE_URL should point to your backend server

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache configuration
[[headers]]
  for = "index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/main*.js"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

[[headers]]
  for = "*.woff*"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

# API Proxy - If backend is on a different domain
# Uncomment and configure if needed
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-api.com/api/:splat"
#   status = 200
#   force = true
