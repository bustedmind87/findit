# Netlify Configuration for FindIt Angular Application

[build]
  # Build command - generates the dist folder
  command = "npm run build"
  # Output directory where the build artifacts are
  publish = "dist/lostfound-frontend/browser"
  # Function directory if you have serverless functions
  functions = "netlify/functions"

# API Proxy - Forward frontend /api requests to Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://findit-production-f2dc.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA Routing - All non-API routes redirect to index.html for Angular routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment Variables - Set these in Netlify UI under Site Settings > Build & deploy > Environment
# API_BASE_URL should point to your backend server

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache configuration
[[headers]]
  for = "index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/main*.js"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

[[headers]]
  for = "*.woff*"
  [headers.values]
    Cache-Control = "public, max-age=365d, immutable"

# API Proxy is configured above for production backend.
