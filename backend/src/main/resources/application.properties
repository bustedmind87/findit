spring.datasource.url=jdbc:h2:file:./data/finditdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# File upload configuration
# Default is inside backend static resources so uploaded files are part of backend project tree.
# Override with APP_UPLOAD_DIR in deployment environments.
app.upload.dir=${APP_UPLOAD_DIR:src/main/resources/static/uploads}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JSON configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non-null

# Server configuration
server.port=8080